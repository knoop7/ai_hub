# 🚀 极致优化数值参数版本 - 智能范围 + 常用值
language: "zh-CN"

# ========== 响应配置优化 ==========
responses:
  cancel:
    message: "好的，已取消。"
  default:
    success_message: "操作已完成"
    error_message: "操作失败，请稍后再试"
  error:
    default_error: "操作失败"
  automation:
    creation_success: "我已经为您创建了自动化: {automation_name}"
    creation_error: "创建自动化失败: {error}"

# ========== 自动化配置 ==========
automation_keywords:
  - "创建自动化"
  - "设置自动化"
  - "自动执行"
  - "定时执行"
  - "当...时候"
  - "如果...就"
  - "帮我创建"
  - "智能控制"
  - "设置定时"

