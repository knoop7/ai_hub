intents:

  # ========== 设备开关控制 ==========

  设备打开:
    use_home_assistant: true
    data:
      # 打开所有设备
      - sentences:
          - "[<let>][打开|开启|开][所有]设备"
          - "[<let>][打开|开启|开]所有设备"
          - "[<let>][打开|开启|开][所有][灯]"
          - "[<let>][打开|开启|开]所有[灯]"

      # 打开特定设备
      - sentences:
          - "[<let>][打开|开启|开]{name}"
          - "[<let>]{name}[打开|开启|开]"
          - "[<let>][把]{name}[打开|开启|开]"
          - "[<let>][让]{name}[打开|开启|开]"
        requires_context:
          domain: any

      # 打开区域的设备
      - sentences:
          - "[<let>][打开|开启|开][所有]{area}[的]设备"
          - "[<let>][打开|开启|开]{area}[所有]的设备"
          - "[<let>][打开|开启|开]{area}[所有]的灯"
          - "[<let>][打开|开启|开][所有]{area}[的]灯]"
        slots:
          domain: "all"
          name: "all"

  设备关闭:
    use_home_assistant: true
    data:
      # 关闭所有设备
      - sentences:
          - "[<let>][关闭|关上|关][所有]设备"
          - "[<let>][关闭|关上|关]所有设备"
          - "[<let>][关闭|关上|关][所有][灯]"
          - "[<let>][关闭|关上|关]所有[灯]"
        slots:
          domain: "all"
          name: "all"

      # 关闭特定设备
      - sentences:
          - "[<let>][关闭|关上|关]{name}"
          - "[<let>]{name}[关闭|关上|关]"
          - "[<let>][把]{name}[关闭|关上|关]"
          - "[<let>][让]{name}[关闭|关上|关]"
        requires_context:
          domain: any

      # 关闭区域的设备
      - sentences:
          - "[<let>][关闭|关上|关][所有]{area}[的]设备"
          - "[<let>][关闭|关上|关]{area}[所有]的设备"
          - "[<let>][关闭|关上|关]{area}[所有]的灯"
          - "[<let>][关闭|关上|关][所有]{area}[的]灯]"

  # ========== 灯光控制 ==========

  灯光亮度调节:
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][把|将]{name}[的][亮度][调节|设置|设][到][<brightness_level>]"
          - "[<let>][设置|调节]{name}[亮度][为][<brightness_level>]"
          - "[<let>]{name}[亮度][调到][<brightness_level>]"
          - "[<let>][让]{name}[亮度][变为][<brightness_level>]"
          - "[<let>][把|将]{name}[亮度][设为][<brightness_level>]"
          - "[<let>]{name}[亮度][<brightness_level>]"
        requires_context:
          domain: light

  灯光颜色设置:
    use_home_assistant: true
    data:
      # 亮度控制
      - sentences:
          - "[<let>][把|将]{name}[的][亮度][调|设][到][<brightness_level>%]"
          - "[<let>][设置|调节]{name}[亮度][为][<brightness_level>%]"
          - "[<let>]{name}[亮度][调到][<brightness_level>%]"
          - "[<let>][把|将]{name}[的][亮度][设为][<brightness_level>]"
          - "[<let>][让]{name}[亮度][变为][<brightness_level>]"
          - "[<let>]{name}[亮度][<brightness_level>]"
        requires_context:
          domain: light

      # 颜色控制
      - sentences:
          - "[<let>][把|将]{name}[的][颜色][调|设][为]{color}"
          - "[<let>][设置|调节]{name}[为]{color}色"
          - "[<let>]{name}[灯光][变成]{color}"
          - "[<let>][把|将]{name}[设成]{color}色"
          - "[<let>]{name}[变成]{color}色"
          - "[<let>]{name}[是]{color}色"
        requires_context:
          domain: light

      # 区域灯光亮度控制
      - sentences:
          - "[<let>][把|将]{area}[的][灯][亮度][调|设][到][<brightness_level>%]"
          - "[<let>][设置|调节]{area}[的][灯][亮度][为][<brightness_level>%]"
          - "[<let>]{area}[的][灯][亮度][调到][<brightness_level>%]"
        slots:
          domain: "light"
          name: "all"

      # 区域灯光颜色控制
      - sentences:
          - "[<let>][把|将]{area}[的][灯][设为]{color}色"
          - "[<let>][设置]{area}[的][灯][为]{color}色"
          - "[<let>]{area}[的][灯][变成]{color}"
        slots:
          domain: "light"
          name: "all"

      # 所有灯光颜色控制
      - sentences:
          - "[<let>][把|将][所有]的[灯][设为]{color}色"
          - "[<let>][把|将][所有][灯][设为]{color}色"
          - "[<let>][设置][所有]的[灯][为]{color}色"
          - "[<let>][设置][所有][灯][为]{color}色"
          - "[<let>][所有]的[灯][变成]{color}"
          - "[<let>][所有][灯][变成]{color}"
          - "[<let>][所有]的[灯][全调成]{color}"
          - "[<let>][所有][灯][全调成]{color}"

  # ========== 风扇控制 ==========

  风扇打开:
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][打开|开启|开]{name}[风扇]"
          - "[<let>][启动]{name}[风扇]"
          - "[<let>]{name}[风扇][打开|开启|开]"
        requires_context:
          domain: fan

  风扇关闭:
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][关闭|关上|关]{name}[风扇]"
          - "[<let>][停止]{name}[风扇]"
          - "[<let>]{name}[风扇][关闭|关上|关]"
        requires_context:
          domain: fan

  风扇速度设置:
    use_home_assistant: true
    data:
      # 特定设备速度设置
      - sentences:
          - "[<let>][把|将]{name}[风速|速度][调|设][到][<percentage>%]"
          - "[<let>][设置]{name}[风速|速度][为][<percentage>%]"
          - "[<let>]{name}[风速|速度][设为][<percentage>%]"
          - "[<let>]{name}[风速|速度][<percentage>%]"
        requires_context:
          domain: fan

      # 区域风扇速度设置
      - sentences:
          - "[<let>][把|将]{area}[的]风扇[风速|速度][调|设][到][<percentage>%]"
          - "[<let>][设置]{area}[的]风扇[风速|速度][为][<percentage>%]"
          - "[<let>]{area}[的]风扇[风速|速度][设为][<percentage>%]"
        slots:
          domain: "fan"

  # ========== 空调温度控制 ==========

  空调温度设置:
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][把|将]{name}[温度][设置|设|调][到][<temperature>][度]"
          - "[<let>][设置|调节]{name}[温度][为][<temperature>][度]"
          - "[<let>]{name}[温度][调到][<temperature>][度]"
          - "[<let>][让]{name}[温度][变为][<temperature>][度]"
        requires_context:
          domain: climate

  温度查询:
    use_home_assistant: true
    data:
      # 通用温度查询
      - sentences:
          - "[<let>][现在|当前][多少度|几度|温度多少]"
          - "[<let>][现在|当前][温度][是多少|怎么样]"
          - "[<let>][查看|看看][温度]"
        requires_context:
          domain: climate

      # 特定设备温度查询
      - sentences:
          - "[<let>]{name}[现在|当前][多少度|几度]"
          - "[<let>]{name}[的][温度][是多少|怎么样]"
          - "[<let>][查看|看看]{name}[的][温度]"
        requires_context:
          domain: climate

      # 区域温度查询
      - sentences:
          - "[<let>]{area}[现在|当前][多少度|几度]"
          - "[<let>]{area}[的][温度][是多少|怎么样]"
          - "[<let>][查看|看看]{area}[的][温度]"
        slots:
          domain: "climate"

  # ========== 媒体控制 ==========

  下一首:
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][播放|切换到][下一首|下一个]"
          - "[<let>][切歌|换一首]"
          - "[<let>][跳过][这]首[歌]"
        requires_context:
          domain: media_player

  上一首:
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][播放|切换到][上一首|上一个]"
          - "[<let>][回到][上一首|上一个]"
