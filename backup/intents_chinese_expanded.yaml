  音量设置:
    use_home_assistant: true
    data:
      # 具体音量值设置
      - sentences:
          - "[<let>][把|将]音量[调|设][到][<volume_level>%]"
          - "[<let>][设置]音量[为][<volume_level>%]"
          - "[<let>][音量][设为][<volume_level>%]"
          - "[<let>][音量][<volume_level>%]"
        requires_context:
          domain: media_player

      # 特定设备音量设置
      - sentences:
          - "[<let>][把|将]{name}[的]音量[调|设][到][<volume_level>%]"
          - "[<let>][设置]{name}[的]音量[为][<volume_level>%]"
          - "[<let>]{name}[音量][设为][<volume_level>%]"
          - "[<let>]{name}[音量][<volume_level>%]"
