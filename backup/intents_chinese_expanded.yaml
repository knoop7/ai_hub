          domain: media_player

  暂停播放:
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][暂停][播放]"
          - "[<let>][停一下]"
          - "[<let>][暂停]"
        requires_context:
          domain: media_player

  继续播放:
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][继续][播放]"
          - "[<let>][开始][播放]"
          - "[<let>][播放]"
        requires_context:
          domain: media_player

  音量调高:
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][调高|增大|提高][音量]"
          - "[<let>][声音][大一点]"
