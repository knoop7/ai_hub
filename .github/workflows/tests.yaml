name: Unit Tests

on:
  push:
    paths-ignore:
      - '.github/workflows/**'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install test dependencies
        run: python -m pip install --upgrade pip && pip install pytest aiohttp
      - name: Run tests
        run: pytest -q
