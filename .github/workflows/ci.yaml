name: Python CI

on:
  push:
    paths-ignore:
      - '.github/workflows/**'
  pull_request:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 mypy pytest pytest-asyncio homeassistant voluptuous aiohttp

      - name: Run PEP8 checks
        run: |
          flake8 custom_components tests

      - name: Run mypy
        run: |
          mypy custom_components/ai_hub

      - name: Run pytest
        run: |
          pytest -q
