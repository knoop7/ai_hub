name: Release

on:
  push:
    paths:
      - 'custom_components/ai_hub/manifest.json'
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from manifest
        id: extract_version
        if: github.event_name == 'push'
        run: |
          version=$(jq -r '.version' custom_components/ai_hub/manifest.json)
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "version_number=${version#v}" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        if: github.event_name == 'push'
        run: |
          version="${{ steps.extract_version.outputs.version }}"
          if git rev-parse "$version" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $version already exists, skipping release"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $version does not exist, will create release"
          fi

      - name: Get previous tag
        id: prev_tag
        run: |
          # 获取最新的（前一个）tag，排除当前要生成的（如果已存在则下一个）
          git fetch --tags
          prev_tag=$(git tag --sort=-creatordate | grep -v "^${{ steps.extract_version.outputs.version }}$" | head -n 1)
          echo "prev_tag=$prev_tag" >> $GITHUB_OUTPUT

      - name: Create changelog since previous release
        id: changelog
        run: |
          prev_tag="${{ steps.prev_tag.outputs.prev_tag }}"
          version="${{ steps.extract_version.outputs.version }}"
          if [ -n "$prev_tag" ]; then
            log=$(git log --pretty=format:"* %s (%an)" "$prev_tag"..HEAD)
          else
            log=$(git log --pretty=format:"* %s (%an)")
          fi
          # 替换 Github Actions 换行需求
          log="${log//$'\n'/'%0A'}"
          echo "log=$log" >> $GITHUB_OUTPUT

      - name: Create tag and release
        if: github.event_name == 'push' && steps.check_tag.outputs.exists == 'false'
        run: |
          version="${{ steps.extract_version.outputs.version }}"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a "$version" -m "Release $version"
          git push origin "$version"

      - name: Create GitHub Release
        if: github.event_name == 'push' && steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.extract_version.outputs.version }}
          name: Release ${{ steps.extract_version.outputs.version }}
          body: |
            Auto-release for version ${{ steps.extract_version.outputs.version }}

            Changes triggered by manifest.json update.

            ## Changes since last release

            ${{ steps.changelog.outputs.log }}
          draft: false
          prerelease: false

      - name: Create zip file
        run: |
          cd ${{ github.workspace }}/custom_components/ai_hub
          zip -r ai_hub.zip ./

      - name: Upload release asset
        if: github.event_name == 'push' && steps.check_tag.outputs.exists == 'false'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ github.workspace }}/custom_components/ai_hub/ai_hub.zip
          asset_name: ai_hub.zip
          tag: ${{ steps.extract_version.outputs.version }}
          overwrite: true

      - name: Upload release asset to existing release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ github.workspace }}/custom_components/ai_hub/ai_hub.zip
          asset_name: ai_hub.zip
          tag: ${{ github.ref }}
          overwrite: true