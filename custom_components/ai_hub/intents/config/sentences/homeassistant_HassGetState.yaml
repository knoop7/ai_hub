expansion_rules:
  let: "请|帮我|麻烦|给|能否|可以吗|麻烦您|劳驾|拜托|请问|把|请把|麻烦把|帮我把"
  turn: "打开|开启|开|启动|点亮|放亮"
  close: "关闭|关上|关|停止|熄灭|灭灯|关掉"
  turn_on: "打开|开启|开|启动|点亮"
  turn_off: "关闭|关上|关|停止|熄灭|关掉"
  set: "设置|设定|调节|调|设"
  all_on: "全屋打开|全家打开|整屋打开|所有区域打开"
  all_off: "全屋关闭|全家关闭|整屋关闭|所有区域关闭"
  open_cover: "拉开|升起|打开"
  close_cover: "拉上|降下|关闭"
  brightness: "(亮度|明亮度|光亮度)"
  volume: "(音量|声音|声量)"
  temperature: "(温度|气温|室温)"
  light: "(灯|吸顶灯|筒灯|射灯|台灯|床头灯|灯光)[的]"
  brightness_level: "<1-100>"
  volume_level: "<0-100>"
  percentage: "<0-100>"
  timer_duration: "<1-60>"
  temperature_level: "<16-30>"
  to: "(为|到|成|至)"
  set_to: "(设置|设定|调节|调|设)(为|到|至)"
  color: "红色|绿色|蓝色|黄色|白色|橙色|紫色|粉色|棕色|灰色|青色|金色|银色|彩色"
  action_verbs: "打开|开启|关闭|关上|启动|停止|设置|调节|切换|改成|改为|拉开|升到|拉上|降下|调整为|创建|添加|开始|取消|结束|删除|播放|收听|唱|放"
  function_verbs: "查询|查看|看看|分析|检查|观察|识别|告诉我|记住|记录|记一下|备忘|提醒我|提醒|提示我|创建|发送|做个"
  aux_words: "在|用|从|到|成|为|给|向|往|一下|下|这个|那个"
  floor: "(一楼|二楼|三楼|四楼|五楼|六楼|七楼|八楼|九楼|十楼|一楼|底层|顶楼)[的]"
  area_floor: "<area>[的]<floor>"
  in_area_floor: "[在]<area_floor>"
  here: "(这里|这儿|这边|这)"
  how_is: "(怎么样|如何|状态)"
  lockable: "(门锁|智能锁|电子锁|密码锁|指纹锁|锁)"
  clean: "(清扫|打扫|吸尘|拖地|洗地)"
  color_temp: "(色温|冷暖|色温值)"
  currently: "(现在|当前|目前|此时)"
  state: "(状态|情况|状况)"
  the: "(这个|那个|这|那)[的]"
  home: "(家|屋|室内|房子)"
  everywhere: "(到处|处处|全屋|全家|每个|各个|所有)"
  all: "(所有|全部|各个|每个|一切|整屋|全家)"
  which: "(哪个|哪些|哪几个)"
  how_many_is: "(多少|几个|几台|几部)"
  what_is: "(是什么|是多少|几|什么)"
  like: "(怎么样|如何)"
  area: "[在]<area_names>[的]"
  name: "{name}"
  weather: "(天气|气象|天候)"
  date: "(日期|号|几号|星期几|周几|今天几号)"
  time: "(时间|几点|几时|现在几点)"
  today: "(今天|今日|本日)"
  add: "(添加|增加|加|新增|放进|加入)"
  add_to: "(到|至|进入|进去|里面)"
  pause: "(暂停|停|停下)"
  resume: "(继续|恢复|接着)"
  next: "(下一首|下一个|切歌|跳过)"
  previous: "(上一首|上一个|回退|退回)"
  start: "(开始|启动|开启)"
  return: "(回去|返回|回巢|回充|回基站)"
  clean: "(清扫|打扫|吸尘|拖地|洗地)"

skip_words:
  - "请"
  - "帮我"
  - "麻烦"
  - "给"
  - "能否"
  - "可以吗"
  - "麻烦您"
  - "劳驾"
  - "拜托"
  - "请问"
  - "把"
  - "一下"
  - "吧"
  - "啊"
  - "呢"
  - "嘛"
  - "哈"
  - "哦"
  - "呀"
  - "的"
  - "了"
  - "过"

intents:
  HassGetState:
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>] <function_verbs>[<area>]{name}[的]状态"
          - "[<let>] [<area>]{name}[现在|当前]是什么状态"
          - "[<let>] [<area>]{name}[怎么样|如何]"
        slots:
          domain: all
