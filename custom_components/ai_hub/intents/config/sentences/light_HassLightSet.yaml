language: "zh-CN"

lists:
  brightness_level:
    values:
      - in: "最(亮|高|大)"
        out: 100
      - in: "最(暗|低|小)"
        out: 1

expansion_rules:
  set: "设置|设定|调节|调|设"
  brightness: "(亮度|明亮度|光亮度)"
  light: "(灯|吸顶灯|筒灯|射灯|台灯|床头灯|灯光)[的]"
  to: "(为|到|成|至)"
  set_to: "(设置|设定|调节|调|设)(为|到|至)"
  color: "红色|绿色|蓝色|黄色|白色|橙色|紫色|粉色|棕色|灰色|青色|金色|银色|彩色"

local_intents:
  GlobalDeviceControl:
    param_keywords:
      - "设置"
      - "调节"
      - "调到"
      - "设为"
      - "调成"
      - "调整"
      - "设"
      - "调"
      - "改为"
      - "变成"
      - "变为"
      - "到"
      - "为"
    brightness_keywords:
      - "亮度"
      - "明亮度"
      - "光亮度"
      - "明暗"
    brightness_complaint:
      hot_keywords: ["太亮", "太刺眼", "太亮了", "太刺眼了", "太白", "太白了"]
      cold_keywords: ["太暗", "太黑", "太暗了", "太黑了", "太暗淡", "太暗淡了"]
      default_brightness:
        hot_recommendation: 30
        cold_recommendation: 70
    brightness_adjust:
      brighter_keywords: ["调亮", "亮一点", "亮点", "调亮一点", "调亮点", "亮一些", "调亮一些"]
      dimmer_keywords: ["调暗", "暗一点", "暗点", "调暗一点", "调暗点", "暗一些", "调暗一些"]
      subtle_keywords: ["一点", "点", "一些"]
      small_delta: 15
      default_delta: 30
      direction_labels:
        up: "高"
        down: "低"
    color_keywords:
      - "颜色"
      - "颜色色"
      - "色彩"
      - "变为"
      - "变成"
      - "调为"
      - "设置为"
      - "改成"
    color_values:
      红色: "red"
      绿色: "green"
      蓝色: "blue"
      黄色: "yellow"
      白色: "white"
      暖白: "warm_white"
      冷白: "cool_white"
      橙色: "orange"
      紫色: "purple"
      粉色: "pink"
      棕色: "brown"
      灰色: "gray"
      青色: "cyan"
      金色: "gold"
      银色: "silver"
      彩色: "rainbow"
    color_rgb_values:
      red: [255, 0, 0]
      green: [0, 255, 0]
      blue: [0, 0, 255]
      yellow: [255, 255, 0]
      white: [255, 255, 255]
      warm_white: [255, 220, 180]
      cool_white: [255, 248, 220]
      orange: [255, 165, 0]
      purple: [128, 0, 128]
      pink: [255, 192, 203]
      brown: [165, 42, 42]
      gray: [128, 128, 128]
      cyan: [0, 255, 255]
      gold: [255, 215, 0]
      silver: [192, 192, 192]
      rainbow: [255, 0, 255]
    responses:
      success_brightness: "已将{area}{device}亮度调至{brightness}%"
      success_brightness_adjust: "已将{area}{device}亮度调{direction}{amount}%"
      success_color: "已将{area}{device}颜色设置为{color}"

intents:
  HassLightSet:
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][把]<name>[的]亮度[<set_to>]<brightness>"
          - "(设置|调节)<name>[的]亮度<to><brightness>"
          - "<name>[的]亮度[<set_to>]<brightness>"
        response: brightness
        requires_context:
          domain: light
      - sentences:
          - "[<let>][把]<area>[<light>][的]亮度[<set_to>]<brightness>"
          - "(设置|调节)<area>[<light>][的]亮度<to><brightness>"
          - "<area>[<light>][的]亮度[<set_to>]<brightness>"
        slots:
          name: all
        response: brightness_area
      - sentences:
          - "[<let>][把]这里[<light>][的]亮度[<set_to>]<brightness>"
          - "(设置|调节)这里[<light>][的]亮度<to><brightness>"
          - "这里[<light>][的]亮度[<set_to>]<brightness>"
        response: brightness_area
        requires_context:
          area:
            slot: true
      - sentences:
          - "[<let>][把]<name>[的]亮度[<set_to>]{brightness_level:brightness}"
          - "(设置|调节)<name>[的]亮度<to>{brightness_level:brightness}"
          - "<name>[的]亮度[<set_to>]{brightness_level:brightness}"
        requires_context:
          domain: light
        response: brightness
      - sentences:
          - "[<let>][把]<area>[<light>][的]亮度[<set_to>]{brightness_level:brightness}"
          - "(设置|调节)<area>[<light>][的]亮度<to>{brightness_level:brightness}"
          - "<area>[<light>][的]亮度[<set_to>]{brightness_level:brightness}"
        slots:
          name: all
        response: brightness_area
      - sentences:
          - "[<let>][把]这里[<light>][的]亮度[<set_to>]{brightness_level:brightness}"
          - "(设置|调节)这里[<light>][的]亮度<to>{brightness_level:brightness}"
          - "这里[<light>][的]亮度[<set_to>]{brightness_level:brightness}"
        response: brightness_area
        requires_context:
          area:
            slot: true
      - sentences:
          - "[<let>][把]<name>[的][颜色][<set_to>]{color}"
          - "(设置|调节)<name>[的][颜色]<to>{color}"
          - "<name>[的][颜色][<set_to>]{color}"
        requires_context:
          domain: light
        response: color
      - sentences:
          - "[<let>][把]<area>[<light>][的][颜色][<set_to>]{color}"
          - "(设置|调节)<area>[<light>][的][颜色]<to>{color}"
          - "<area>[<light>][的][颜色][<set_to>]{color}"
        slots:
          name: all
        response: color_area
      - sentences:
          - "[<let>][把]这里[<light>][的][颜色][<set_to>]{color}"
          - "(设置|调节)这里[<light>][的][颜色]<to>{color}"
          - "这里[<light>][的][颜色][<set_to>]{color}"
        response: color_area
        requires_context:
          area:
            slot: true
