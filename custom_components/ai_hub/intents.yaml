# 🚀 优化版本 - 与官方中文sentences互补，避免重复
language: "zh-CN"


# ========== 响应配置优化 ==========
responses:
  cancel:
    message: "好的，已取消。"
  default:
    success_message: "操作已完成"
    error_message: "操作失败，请稍后再试"
  error:
    default_error: "操作失败"
  automation:
    creation_success: "我已经为您创建了自动化: {automation_name}"
    creation_error: "创建自动化失败: {error}"
  device_operation:
    verification_success: "操作已成功执行"
    verification_timeout: "命令已发送，设备可能需要几秒钟响应"
    partial_success: "部分设备操作成功，有些设备可能需要更长时间响应"

# ========== 设备操作配置 ==========
device_operations:
  # 3秒验证重试配置
  verification:
    total_timeout: 3  # 总时间限制（秒）
    max_retries: 3    # 最大重试次数
    wait_times: [0.5, 0.8, 1.1]  # 每次重试的等待时间

  # 设备控制操作类型
  control_operations:
    # 照明设备
    light:
      - "light.turn_on"
      - "light.turn_off"
      - "light.toggle"
      - "light.set_brightness"
      - "light.set_color"

    # 开关设备
    switch:
      - "switch.turn_on"
      - "switch.turn_off"
      - "switch.toggle"

    # 气候控制
    climate:
      - "climate.turn_on"
      - "climate.turn_off"
      - "climate.set_temperature"
      - "climate.set_hvac_mode"
      - "climate.set_fan_mode"

    fan:
      - "fan.turn_on"
      - "fan.turn_off"
      - "fan.set_speed"
      - "fan.set_direction"

    # 遮阳设备
    cover:
      - "cover.open"
      - "cover.close"
      - "cover.set_position"
      - "cover.stop"
      - "cover.toggle"

    # 媒体播放器
    media_player:
      - "media_player.turn_on"
      - "media_player.turn_off"
      - "media_player.play_pause"
      - "media_player.play"
      - "media_player.pause"
      - "media_player.set_volume"
      - "media_player.volume_up"
      - "media_player.volume_down"
      - "media_player.media_play_pause"

    # 安防设备
    lock:
      - "lock.unlock"
      - "lock.lock"

    vacuum:
      - "vacuum.start"
      - "vacuum.pause"
      - "vacuum.stop"
      - "vacuum.return_to_base"

    # 脚本和场景
    script:
      - "script.turn_on"
      - "script.turn_off"
      - "script.toggle"

    scene:
      - "scene.turn_on"

    # 阀门设备
    valve:
      - "valve.open"
      - "valve.close"
      - "valve.set_position"

# ========== 自动化配置 ==========
automation_keywords:
  - "创建自动化"
  - "设置自动化"
  - "自动执行"
  - "定时执行"
  - "当...时候"
  - "如果...就"
  - "帮我创建"
  - "智能控制"
  - "设置定时"

