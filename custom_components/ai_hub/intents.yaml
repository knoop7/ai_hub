    brightness_complaint:
      hot_keywords: ["太亮", "太刺眼", "太亮了", "太刺眼了", "太白", "太白了"]  # 太亮了需要调暗
      cold_keywords: ["太暗", "太黑", "太暗了", "太黑了", "太暗淡", "太暗淡了"]  # 太暗了需要调亮

      # 亮度调节的默认值
      default_brightness:
        hot_recommendation: 30  # 太亮时推荐30%
        cold_recommendation: 70  # 太暗时推荐70%

    # 颜色控制关键词
    color_keywords:
      - "颜色"
      - "颜色色"
      - "色彩"

    # 音量控制关键词
    volume_keywords:
      - "音量"
      - "声音"
      - "声量"
      - "音量大小"

    # 窗帘位置关键词
    cover_position_keywords:
      - "位置"
      - "开度"
      - "高度"
      - "百分比"
      - "开到"
      - "关到"
      - "调到"
      - "降到"
      - "升到"

    # 风扇速度关键词
    fan_speed_keywords:
      - "风速"
      - "速度"
      - "转速"
      - "档位"

    # 参数控制范围和转换规则
    parameter_ranges:
      # 温度控制
      temperature:
        min: 16
        max: 30
        unit: "度"
        pattern: "(\\d{1,2})\\s*度"
        ha_service: "set_temperature"

      # 色温控制 (灯光)
      color_temperature:
        min: 2700  # 暖白
        max: 6500  # 冷白
        unit: "K"
        pattern: "(\\d{3,4})\\s*K?"
        ha_service: "turn_on"

      # 亮度控制 (灯光)
      brightness:
        min: 0
        max: 100
        unit: "%"
        pattern: "(\\d{1,3})\\s*%?"
        conversion_factor: 2.54  # HA使用0-255范围
        conversion_target: "0-255"
        ha_service: "turn_on"

      # 音量控制 (媒体设备)
      volume:
        min: 0
        max: 100
        unit: "%"
        pattern: "(\\d{1,3})\\s*%?"
        conversion_factor: 0.01  # HA使用0-1范围
        conversion_target: "0-1"
        ha_service: "volume_set"

      # 位置控制 (窗帘、阀门)
      position:
        min: 0
        max: 100
        unit: "%"
        pattern: "(\\d{1,3})\\s*%?"
        conversion_target: "direct"  # 直接使用
        ha_service: "set_cover_position"

      # 速度控制 (风扇)
      speed:
        min: 0
        max: 100
        unit: "%"
        pattern: "(\\d{1,3})\\s*%?"
        conversion_target: "speed_levels"  # 转换为速度等级
        ha_service: "set_speed"

      # 频道控制 (媒体设备)
      channel:
        min: 1
        max: 999
        unit: "频道"
        pattern: "(频道|台)\\s*(\\d{1,3})"
        extraction_group: 2  # 提取数字部分
        ha_service: "media_play_media"

      # 颜色控制 (灯光)
      color:
        min: 0
        max: 360
        unit: "度"  # 色相角度
        pattern: "(\\d{1,3})\\s*度"
        conversion_target: "hue"  # 色相角度
        ha_service: "turn_on"

    # 颜色值映射
    color_values:
      红色: "red"
      绿色: "green"
      蓝色: "blue"
      黄色: "yellow"
      白色: "white"
      暖白: "warm_white"
      冷白: "cool_white"
      橙色: "orange"
      紫色: "purple"
      粉色: "pink"
      棕色: "brown"
      灰色: "gray"
      青色: "cyan"
      金色: "gold"
      银色: "silver"
      彩色: "rainbow"

    # 颜色RGB值映射
    color_rgb_values:
      red: [255, 0, 0]
      green: [0, 255, 0]
      blue: [0, 0, 255]
      yellow: [255, 255, 0]
      white: [255, 255, 255]
      warm_white: [255, 220, 180]
      cool_white: [255, 248, 220]
      orange: [255, 165, 0]
      purple: [128, 0, 128]
      pink: [255, 192, 203]
      brown: [165, 42, 42]
      gray: [128, 128, 128]
      cyan: [0, 255, 255]
      gold: [255, 215, 0]
      silver: [192, 192, 192]
      rainbow: [255, 0, 255]

