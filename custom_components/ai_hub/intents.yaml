language: "zh-CN"

# 增强意图配置 - 基于官方中英文意图文件的严格差异分析
# 完整补充中文官方缺失的所有意图，提供与英文版同等的功能覆盖

# 可配置参数 - 避免硬编码
cancel_patterns:
  - "算了"
  - "取消"
  - "不用了"
  - "nevermind"
  - "cancel"

responses:
  cancel:
    message: "好的，已取消。"
  default:
    success_message: "操作已完成"
    error_message: "操作失败，请稍后再试"
  error:
    default_error: "操作失败"
  automation:
    creation_success: "我已经为您创建了自动化: {automation_name}"
    creation_error: "创建自动化失败: {error}"

# 自动化关键词配置
automation_keywords:
  - "创建自动化"
  - "创建一个自动化"
  - "设置自动化"
  - "自动执行"
  - "automation"
  - "create automation"
  - "定时执行"
  - "当...时候"
  - "如果...就"
  - "当...就"
  - "帮我创建"

# 自动化创建前缀
automation_prefixes:
  - "创建自动化"
  - "创建一个自动化"
  - "设置自动化"
  - "帮我创建"
  - "create automation"
  - "帮我设置"

# 配置化的区域和设备名称
common_areas:
  - "客厅"
  - "卧室"
  - "厨房"
  - "浴室"
  - "书房"
  - "阳台"
  - "玄关"
  - "餐厅"
  - "卫生间"
  - "车库"
  - "花园"

# 设备映射配置
device_mappings:
  name_to_domain:
    "灯": "light"
    "灯光": "light"
    "照明": "light"
    "吸顶灯": "light"
    "筒灯": "light"
    "射灯": "light"
    "台灯": "light"
    "床头灯": "light"
    "风扇": "fan"
    "电扇": "fan"
    "空调": "climate"
    "电视": "media_player"
    "音箱": "media_player"
    "窗帘": "cover"
    "车库门": "cover"
    "开关": "switch"
    "插座": "switch"
    "扫地机": "vacuum"
    "吸尘器": "vacuum"
    "摄像头": "camera"
    "门锁": "lock"

# 扩展规则 - 性能优化版本
expansion_rules:
  let: "请|帮我|麻烦|给|能否|可以吗|麻烦您|劳驾|拜托|请问"
  turn: "打开|开启|开|启动"
  close: "关闭|关上|关|停止"
  set: "设置|设定|调节|调|设"
  brightness: "亮度|明亮度|光亮度"
  volume: "音量|声音|声量"
  temperature: "温度|气温|室温"
  all: "所有|全部|整个"


intents:

  # ========== 增强意图 - Home Assistant原生意图的中文增强版本 ==========

  HassTurnOn:
    use_home_assistant: true
    data:
      # 打开所有设备
      - sentences:
          - "[<let>][打开|开启|开][所有]设备"
          - "[<let>][打开|开启|开]所有设备"
          - "[<let>][打开|开启|开][所有][灯]"
          - "[<let>][打开|开启|开]所有[灯]"
        slots:
          domain: "all"
          name: "all"

      # 打开特定设备
      - sentences:
          - "[<let>][打开|开启|开]{name}"
          - "[<let>]{name}[打开|开启|开]"
          - "[<let>][把]{name}[打开|开启|开]"
          - "[<let>][让]{name}[打开|开启|开]"
        requires_context:
          domain: any

      # 打开区域的设备
      - sentences:
          - "[<let>][打开|开启|开][所有]{area}[的]设备"
          - "[<let>][打开|开启|开]{area}[所有]的设备"
          - "[<let>][打开|开启|开]{area}[所有]的灯"
          - "[<let>][打开|开启|开][所有]{area}[的]灯"
        slots:
          domain: "all"
          name: "all"

  HassTurnOff:
    use_home_assistant: true
    data:
      # 关闭所有设备
      - sentences:
          - "[<let>][关闭|关上|关][所有]设备"
          - "[<let>][关闭|关上|关]所有设备"
          - "[<let>][关闭|关上|关][所有][灯]"
          - "[<let>][关闭|关上|关]所有[灯]"
        slots:
          domain: "all"
          name: "all"

      # 关闭特定设备
      - sentences:
          - "[<let>][关闭|关上|关]{name}"
          - "[<let>]{name}[关闭|关上|关]"
          - "[<let>][把]{name}[关闭|关上|关]"
          - "[<let>][让]{name}[关闭|关上|关]"
        requires_context:
          domain: any

      # 关闭区域的设备
      - sentences:
          - "[<let>][关闭|关上|关][所有]{area}[的]设备"
          - "[<let>][关闭|关上|关]{area}[所有]的设备"
          - "[<let>][关闭|关上|关]{area}[所有]的灯"
          - "[<let>][关闭|关上|关][所有]{area}[的]灯"
        slots:
          domain: "all"
          name: "all"

  HassSetPosition: # 灯光亮度控制
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][把|将]{name}[的][亮度][调节|设置|设][到][<brightness_level>]"
          - "[<let>][设置|调节]{name}[亮度][为][<brightness_level>]"
          - "[<let>]{name}[亮度][调到][<brightness_level>]"
          - "[<let>][让]{name}[亮度][变为][<brightness_level>]"
        requires_context:
          domain: light

  HassTurnOnFan: # 风扇控制
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][打开|开启|开]{name}[风扇]"
          - "[<let>][启动]{name}[风扇]"
          - "[<let>]{name}[风扇][打开|开启|开]"
        requires_context:
          domain: fan

  HassTurnOffFan: # 关闭风扇
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][关闭|关上|关]{name}[风扇]"
          - "[<let>][停止]{name}[风扇]"
          - "[<let>]{name}[风扇][关闭|关上|关]"
        requires_context:
          domain: fan

  HassClimateSetTemperature: # 空调温度设置
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][把|将]{name}[温度][设置|设|调][到][<temperature>][度]"
          - "[<let>][设置|调节]{name}[温度][为][<temperature>][度]"
          - "[<let>]{name}[温度][调到][<temperature>][度]"
          - "[<let>][让]{name}[温度][变为][<temperature>][度]"
        requires_context:
          domain: climate

  HassMediaNext: # 媒体下一首
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][播放|切换到][下一首|下一个]"
          - "[<let>][切歌|换一首]"
          - "[<let>][跳过][这]首[歌]"
        requires_context:
          domain: media_player

  HassMediaPrevious: # 媒体上一首
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][播放|切换到][上一首|上一个]"
          - "[<let>][回到][上一首|上一个]"
        requires_context:
          domain: media_player

  HassMediaPause: # 媒体暂停
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][暂停][播放]"
          - "[<let>][停一下]"
          - "[<let>][暂停]"
        requires_context:
          domain: media_player

  HassMediaUnpause: # 媒体继续播放
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][继续][播放]"
          - "[<let>][开始][播放]"
          - "[<let>][播放]"
        requires_context:
          domain: media_player

  HassIncreaseVolume: # 增加音量
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][调高|增大|提高][音量]"
          - "[<let>][声音][大一点]"
          - "[<let>][音量]+"
        requires_context:
          domain: media_player

  HassDecreaseVolume: # 减少音量
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][调低|减小|降低][音量]"
          - "[<let>][声音][小一点]"
          - "[<let>][音量]-"
        requires_context:
          domain: media_player

  # ========== 查询类意图 ==========

  HassGetState: # 获取设备状态
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][查看|检查|看看]{name}[的][状态]"
          - "[<let>]{name}[怎么样了|还好吗|状态如何]"
          - "[<let>][告诉我]{name}[的][状态]"
        requires_context:
          domain: any

  HassGetWeather: # 天气查询
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][今天|明天][天气][怎么样]"
          - "[<let>][查一下][今天|明天][的][天气]"
          - "[<let>][告诉我][今天|明天][的][天气]"
          - "[<let>][现在][天气][如何]"

  # ========== 窗帘控制类意图 ==========

  HassOpenCover: # 打开窗帘
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][打开|拉开]{name}"
          - "[<let>][拉开]{name}[窗帘]"
          - "[<let>]{name}[窗帘][打开|拉开]"
        requires_context:
          domain: cover

  HassCloseCover: # 关闭窗帘
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][关闭|拉上]{name}"
          - "[<let>][拉上]{name}[窗帘]"
          - "[<let>]{name}[窗帘][关闭|拉上]"
        requires_context:
          domain: cover

  # ========== 清洁设备控制 ==========

  HassStart: # 开始清洁
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][启动|开始]{name}[工作|清洁]"
          - "[<let>]{name}[开始][清洁|工作]"
          - "[<let>][让]{name}[开始][清洁]"
        requires_context:
          domain: vacuum

  HassPause: # 暂停清洁
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][暂停]{name}[工作|清洁]"
          - "[<let>]{name}[暂停][工作]"
          - "[<let>][让]{name}[暂停]"
        requires_context:
          domain: vacuum

  HassReturnToBase: # 回充
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>]{name}[回][去][充电]"
          - "[<let>][让]{name}[回][去][充电]"
          - "[<let>]{name}[返回][充电座]"
        requires_context:
          domain: vacuum

  # ========== 通用控制意图 ==========

  HassToggle: # 切换设备状态
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][切换]{name}[状态]"
          - "[<let>][切换]{name}"
          - "[<let>]{name}[切换][一下]"
        requires_context:
          domain: any

  HassCancel: # 取消操作 - 最高优先级，直接处理
    use_home_assistant: false
    bypass_home_assistant: true
    data:
      - sentences:
          - "[<let>][算了|取消|不用了]"
          - "[<let>]nevermind"
          - "[<let>]cancel"

  # ========== 定时器意图 ==========

  TimerStart: # 开始定时
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][设置|设定]定时器[<timer_duration>]"
          - "[<let>][定时][<timer_duration>]"
          - "[<let>][提醒][我][<timer_duration>][后]"

  TimerCancel: # 取消定时
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][取消][定时器]"
          - "[<let>][停止][定时器]"
          - "[<let>][关掉][定时器]"

  HassShoppingListAddItem: # 购物清单添加
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][添加]{item}[到][购物清单]"
          - "[<let>][把]{item}[加入][购物清单]"
          - "[<let>][购物清单][添加]{item}"

  # ========== 摄像头意图 ==========

  HassCameraRecord: # 录制视频
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][开始][录制]{name}[视频]"
          - "[<let>]{name}[开始][录制]"
          - "[<let>][录制]{name}[视频]"
        requires_context:
          domain: camera

  HassCameraImage: # 拍照
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][拍一张][照片]"
          - "[<let>][给][我][拍照]"
          - "[<let>][拍摄][照片]"
        requires_context:
          domain: camera

  HassCameraStream: # 查看实时画面
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][查看|看看]{name}[实时画面]"
          - "[<let>]{name}[实时画面]"
          - "[<let>][打开]{name}[摄像头]"
        requires_context:
          domain: camera

  # ========== 场景意图 ==========

  HassActivateScene: # 激活场景
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][激活|启动|开启]{name}[场景]"
          - "[<let>][执行]{name}[场景]"
          - "[<let>]{name}[场景][激活|启动]"
        requires_context:
          domain: scene

  # ========== 音乐控制意图 ==========

  MusicPlay: # 播放音乐
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][播放][音乐|歌曲]"
          - "[<let>][来][点][音乐|歌曲]"
          - "[<let>][放一首][歌]"
        requires_context:
          domain: media_player

  MusicPlayQuery: # 搜索播放
    use_home_assistant: true
    data:
      - sentences:
          - "[<let>][播放|放|听|看][音乐|歌曲|视频]{query}"
          - "[<let>][帮我|请][播放|放|听|看][音乐|歌曲|视频]{query}"
        requires_context:
          domain: media_player

  # ========== 自定义AI助手意图 ==========

  AIAssistantIntent: # AI助手对话 - 自定义意图，不经过HA
    use_home_assistant: false
    bypass_home_assistant: true
    data:
      - sentences:
          - "[<let>]ai助手[帮我|请|麻烦]"
          - "[<let>][ai助手|智能助手][帮我|请|麻烦]{message}"
          - "[<let>][你好|您好|hi|hello]"
          - "[<let>][谢谢|感谢|thank you]"
          - "[<let>][我们|让我][聊天|说话|对话]吧"
          - "[<let>][请问|可以|能不能][问|说|告诉]我{message}"
          - "[<let>][让我知道]{message}"

  # ========== 感谢意图 ==========

  HassThankYou: # 感谢意图 - 自定义意图，不经过HA
    use_home_assistant: false
    bypass_home_assistant: true
    data:
      - sentences:
          - "[<let>][谢谢|感谢|thank you]"
          - "[<let>]多谢"
          - "[<let>]非常感谢"